version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    container_name: tutochka_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    networks:
      - tutochka_net

  backend:
    image: ghcr.io/yayauheny/tutochka-backend:${TAG:-latest}
    container_name: tutochka_backend
    restart: always
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL_MODE: ${DB_SSL_MODE:-require}
      DB_MAX_POOL_SIZE: ${DB_MAX_POOL_SIZE:-10}
      DB_MIN_IDLE: ${DB_MIN_IDLE:-2}
      DB_CONNECTION_TIMEOUT: ${DB_CONNECTION_TIMEOUT:-30000}
      DB_IDLE_TIMEOUT: ${DB_IDLE_TIMEOUT:-600000}
      DB_MAX_LIFETIME: ${DB_MAX_LIFETIME:-1800000}
      APP_PORT: ${APP_PORT:-8080}
      APP_ENV: ${APP_ENV:-production}
    networks:
      - tutochka_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  bot:
    image: ghcr.io/yayauheny/tutochka-bot:${TAG:-latest}
    container_name: tutochka_bot
    restart: always
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      BOT_WEBHOOK_PATH: ${BOT_WEBHOOK_PATH:?set BOT_WEBHOOK_PATH to a secret webhook path}
      BOT_ASYNC_PROCESSING: ${BOT_ASYNC_PROCESSING:-false}
      BOT_WEBHOOK_PUBLIC_URL: ${BOT_WEBHOOK_PUBLIC_URL}
      BOT_ADMIN_IDS: ${BOT_ADMIN_IDS:-}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://backend:8080/api/v1}
      BACKEND_CONNECT_TIMEOUT_MS: ${BACKEND_CONNECT_TIMEOUT_MS:-3000}
      BACKEND_READ_TIMEOUT_MS: ${BACKEND_READ_TIMEOUT_MS:-5000}
      BACKEND_RETRY_ATTEMPTS: ${BACKEND_RETRY_ATTEMPTS:-2}
      BACKEND_RETRY_DELAY_MS: ${BACKEND_RETRY_DELAY_MS:-200}
      PORT: ${PORT:-8081}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tutochka_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./bot_logs:/app/logs

  alloy:
    image: grafana/alloy:v1.15.1
    container_name: tutochka_alloy
    restart: always
    command: ["run", "--storage.path=/var/lib/alloy/data", "/etc/alloy/config.alloy"]
    environment:
      GRAFANA_CLOUD_PROM_URL: ${GRAFANA_CLOUD_PROM_URL}
      GRAFANA_CLOUD_PROM_USERNAME: ${GRAFANA_CLOUD_PROM_USERNAME}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY}
    volumes:
      - ../alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy
    depends_on:
      backend:
        condition: service_healthy
      bot:
        condition: service_healthy
    networks:
      - tutochka_net

volumes:
  caddy_data:
  alloy_data:

networks:
  tutochka_net:
    driver: bridge
