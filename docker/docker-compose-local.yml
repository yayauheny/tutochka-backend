services:
  postgres:
    platform: linux/amd64
    image: postgis/postgis:17-3.5
    container_name: tutochka_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      TZ: UTC
    ports:
      - "5432:5432"
    command: >
      postgres 
      -c max_connections=100
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c maintenance_work_mem=64MB
      -c work_mem=4MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c max_wal_size=2GB
      -c min_wal_size=1GB
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d postgres" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - tutochka_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: tutochka_backend_local
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
      DB_MAX_POOL_SIZE: ${DB_MAX_POOL_SIZE:-10}
      DB_MIN_IDLE: ${DB_MIN_IDLE:-2}
      DB_CONNECTION_TIMEOUT: ${DB_CONNECTION_TIMEOUT:-30000}
      DB_IDLE_TIMEOUT: ${DB_IDLE_TIMEOUT:-600000}
      DB_MAX_LIFETIME: ${DB_MAX_LIFETIME:-1800000}
      APP_PORT: ${APP_PORT:-8080}
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tutochka_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 350M
        reservations:
          memory: 200M

  bot:
    build:
      context: ..
      dockerfile: bot/Dockerfile
    container_name: tutochka_bot_local
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN required}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:?TELEGRAM_BOT_USERNAME required}
      BOT_WEBHOOK_PATH: ${BOT_WEBHOOK_PATH:-/telegram/webhook}
      BOT_ASYNC_PROCESSING: ${BOT_ASYNC_PROCESSING:-true}
      BOT_WEBHOOK_PUBLIC_URL: ${BOT_WEBHOOK_PUBLIC_URL:-}
      BOT_ADMIN_IDS: ${BOT_ADMIN_IDS:-}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://backend:8080/api/v1}
      BACKEND_CONNECT_TIMEOUT_MS: ${BACKEND_CONNECT_TIMEOUT_MS:-3000}
      BACKEND_READ_TIMEOUT_MS: ${BACKEND_READ_TIMEOUT_MS:-5000}
      BACKEND_RETRY_ATTEMPTS: ${BACKEND_RETRY_ATTEMPTS:-2}
      BACKEND_RETRY_DELAY_MS: ${BACKEND_RETRY_DELAY_MS:-200}
      PORT: ${PORT:-8081}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    ports:
      - "8081:8081"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tutochka_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health/liveness" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 450M
        reservations:
          memory: 250M

  ngrok:
    image: ngrok/ngrok:latest
    container_name: tutochka_ngrok
    command: ["http", "bot:8081", "--log=stdout"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    depends_on:
      - bot
    networks:
      - tutochka_network
    profiles:
      - ngrok

  webhook-registrar:
    image: alpine:latest
    container_name: tutochka_webhook_registrar
    environment:
      NGROK_HOST: ngrok
      NGROK_PORT: "4040"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN required}
      BOT_WEBHOOK_PATH: ${BOT_WEBHOOK_PATH:-/telegram/webhook}
    volumes:
      - ./scripts:/scripts:ro
    command: ["sh", "-c", "apk add --no-cache curl && sh /scripts/register-webhook.sh"]
    depends_on:
      - ngrok
    networks:
      - tutochka_network
    profiles:
      - ngrok
    restart: "no"

networks:
  tutochka_network:
    driver: bridge
