services:
  postgres:
    platform: linux/amd64
    image: postgis/postgis:17-3.5
    container_name: tutochka_postgres_debug
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      TZ: UTC
    ports:
      - "5432:5432"
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c maintenance_work_mem=64MB
      -c work_mem=4MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c max_wal_size=2GB
      -c min_wal_size=1GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - tutochka_debug_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: tutochka_ngrok_debug
    command: ["http", "host.docker.internal:8081", "--log=stdout"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    networks:
      - tutochka_debug_network

  webhook-registrar:
    image: alpine:latest
    container_name: tutochka_webhook_registrar_debug
    environment:
      NGROK_HOST: ngrok
      NGROK_PORT: "4040"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN required}
      BOT_WEBHOOK_PATH: ${BOT_WEBHOOK_PATH:-/telegram/webhook}
      BOT_WEBHOOK_SECRET_TOKEN: ${BOT_WEBHOOK_SECRET_TOKEN:?BOT_WEBHOOK_SECRET_TOKEN required}
    volumes:
      - ./scripts:/scripts:ro
    command: ["sh", "-c", "apk add --no-cache curl && sh /scripts/register-webhook.sh"]
    depends_on:
      - ngrok
    networks:
      - tutochka_debug_network
    restart: "no"

  alloy:
    image: grafana/alloy:v1.15.1
    platform: linux/amd64
    container_name: tutochka_alloy_debug
    restart: always
    init: true
    mem_limit: 192m
    mem_reservation: 96m
    cpus: 0.50
    command: ["run", "--storage.path=/var/lib/alloy/data", "/etc/alloy/config.alloy"]
    environment:
      BACKEND_METRICS_TARGET: ${BACKEND_METRICS_TARGET:-host.docker.internal:8080}
      BOT_METRICS_TARGET: ${BOT_METRICS_TARGET:-host.docker.internal:8081}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      BOT_PORT: ${BOT_PORT:-8081}
      GRAFANA_CLOUD_URL: ${GRAFANA_CLOUD_URL}
      GRAFANA_CLOUD_USERNAME: ${GRAFANA_CLOUD_USERNAME}
      GRAFANA_CLOUD_LOKI_URL: ${GRAFANA_CLOUD_LOKI_URL}
      GRAFANA_CLOUD_LOKI_USERNAME: ${GRAFANA_CLOUD_LOKI_USERNAME}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY}
    volumes:
      - ../alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy
      - ../backend/logs:/var/log/tutochka/backend:ro
      - ../bot/logs:/var/log/tutochka/bot:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tutochka_debug_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  alloy_data:

networks:
  tutochka_debug_network:
    driver: bridge
