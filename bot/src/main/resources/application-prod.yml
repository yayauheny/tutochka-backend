spring:
  application:
    name: tutochka-tg-bot

telegram:
  bot:
    username: ${TELEGRAM_BOT_USERNAME}
    token: ${TELEGRAM_BOT_TOKEN}

bot:
  webhook-path: ${BOT_WEBHOOK_PATH}
  webhook-public-url: ${BOT_WEBHOOK_PUBLIC_URL:}
  webhook-secret-token: ${BOT_WEBHOOK_SECRET_TOKEN}
  admin:
    ids: ${BOT_ADMIN_IDS:}

backend:
  base-url: ${BACKEND_BASE_URL:http://localhost:8080/api/v1}
  connect-timeout-ms: ${BACKEND_CONNECT_TIMEOUT_MS:3000}
  read-timeout-ms: ${BACKEND_READ_TIMEOUT_MS:5000}
  retry-attempts: ${BACKEND_RETRY_ATTEMPTS:1}
  retry-delay-ms: ${BACKEND_RETRY_DELAY_MS:200}

server:
  port: ${BOT_PORT:${PORT:8081}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
