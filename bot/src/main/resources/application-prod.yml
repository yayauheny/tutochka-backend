spring:
  application:
    name: tutochka-tg-bot

telegram:
  bot:
    username: ${TELEGRAM_BOT_USERNAME}
    token: ${TELEGRAM_BOT_TOKEN}
    webhook-path: ${BOT_WEBHOOK_PATH:/telegram/webhook}

bot:
  async-processing: ${BOT_ASYNC_PROCESSING:true}
  webhook-public-url: ${BOT_WEBHOOK_PUBLIC_URL:}
  admin:
    ids: ${BOT_ADMIN_IDS:}

backend:
  base-url: ${BACKEND_BASE_URL:http://localhost:8080/api/v1}
  connect-timeout-ms: ${BACKEND_CONNECT_TIMEOUT_MS:3000}
  read-timeout-ms: ${BACKEND_READ_TIMEOUT_MS:5000}
  retry-attempts: ${BACKEND_RETRY_ATTEMPTS:2}
  retry-delay-ms: ${BACKEND_RETRY_DELAY_MS:200}

server:
  port: ${PORT:8081}

logging:
  level:
    root: INFO
    by.yayauheny.tutochkatgbot: INFO
    org.telegram.telegrambots: WARN
    org.springframework: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /app/logs/bot.log
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
