openapi: 3.0.3
info:
  title: Tutochka Backend API
  description: REST API for managing countries, cities, and restrooms
  version: 0.1.0
  contact:
    name: Tutochka Team
    email: support@tutochka.by

servers:
  - url: http://localhost:8080/api/v1
    description: Development server

paths:
  /health:
    get:
      summary: Health check
      description: Check if the service is running
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  service:
                    type: string
                    example: TuTochka API

  /countries:
    get:
      summary: Get all countries
      description: Retrieve a paginated list of all countries
      parameters:
        - name: page
          in: query
          description: Page number (0-based)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          description: Sort field
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved countries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseCountry'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create new country
      description: Create a new country with the provided data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CountryCreateDto'
      responses:
        '201':
          description: Country created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryResponseDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /countries/{id}:
    get:
      summary: Get country by ID
      description: Retrieve a specific country by its unique identifier
      parameters:
        - name: id
          in: path
          required: true
          description: Country ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Country found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryResponseDto'
        '404':
          description: Country not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /countries/code/{code}:
    get:
      summary: Get country by code
      description: Retrieve a specific country by its country code
      parameters:
        - name: code
          in: path
          required: true
          description: Country code
          schema:
            type: string
            example: US
      responses:
        '200':
          description: Country found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryResponseDto'
        '404':
          description: Country not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cities:
    get:
      summary: Get all cities
      description: Retrieve a paginated list of all cities
      parameters:
        - name: page
          in: query
          description: Page number (0-based)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          description: Sort field
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved cities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseCity'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create new city
      description: Create a new city with the provided data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CityCreateDto'
      responses:
        '201':
          description: City created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityResponseDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cities/{id}:
    get:
      summary: Get city by ID
      description: Retrieve a specific city by its unique identifier
      parameters:
        - name: id
          in: path
          required: true
          description: City ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: City found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityResponseDto'
        '404':
          description: City not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cities/country/{countryId}:
    get:
      summary: Get cities by country
      description: Retrieve cities for a specific country
      parameters:
        - name: countryId
          in: path
          required: true
          description: Country ID
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: Page number (0-based)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successfully retrieved cities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseCity'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Country not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cities/search:
    get:
      summary: Search cities by name
      description: Search cities by name (Russian or English)
      parameters:
        - name: name
          in: query
          required: true
          description: City name to search
          schema:
            type: string
            example: Moscow
        - name: page
          in: query
          description: Page number (0-based)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successfully retrieved cities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseCity'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restrooms:
    get:
      summary: Get all restrooms
      description: Retrieve a paginated list of all restrooms
      parameters:
        - name: page
          in: query
          description: Page number (0-based)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          description: Sort field
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved restrooms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseRestroom'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create new restroom
      description: Create a new restroom with the provided data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestroomCreateDto'
      responses:
        '201':
          description: Restroom created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestroomResponseDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restrooms/{id}:
    get:
      summary: Get restroom by ID
      description: Retrieve a specific restroom by its unique identifier
      parameters:
        - name: id
          in: path
          required: true
          description: Restroom ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Restroom found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestroomResponseDto'
        '404':
          description: Restroom not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restrooms/city/{cityId}:
    get:
      summary: Get restrooms by city
      description: Retrieve restrooms for a specific city
      parameters:
        - name: cityId
          in: path
          required: true
          description: City ID
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: Page number (0-based)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Successfully retrieved restrooms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseRestroom'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: City not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restrooms/nearest:
    get:
      summary: Find nearest restrooms
      description: Find the nearest restrooms to a given location
      parameters:
        - name: lat
          in: query
          required: true
          description: Latitude
          schema:
            type: number
            format: double
            example: 40.7128
        - name: lon
          in: query
          required: true
          description: Longitude
          schema:
            type: number
            format: double
            example: -74.0060
        - name: limit
          in: query
          description: Maximum number of restrooms to return
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 5
      responses:
        '200':
          description: Successfully retrieved nearest restrooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NearestRestroomSlimDto'
        '400':
          description: Missing or invalid coordinates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    CountryCreateDto:
      type: object
      required:
        - nameRu
        - nameEn
        - code
      properties:
        nameRu:
          type: string
          description: Country name in Russian
          example: Соединенные Штаты
        nameEn:
          type: string
          description: Country name in English
          example: United States
        code:
          type: string
          description: Country code
          example: US

    CountryResponseDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        nameRu:
          type: string
          description: Country name in Russian
        nameEn:
          type: string
          description: Country name in English
        code:
          type: string
          description: Country code

    CityCreateDto:
      type: object
      required:
        - countryId
        - nameRu
        - nameEn
        - lat
        - lon
      properties:
        countryId:
          type: string
          format: uuid
          description: Country ID
        nameRu:
          type: string
          description: City name in Russian
          example: Москва
        nameEn:
          type: string
          description: City name in English
          example: Moscow
        region:
          type: string
          description: Region/state
          example: Moscow Oblast
        lat:
          type: number
          format: double
          description: Latitude
          example: 55.7558
        lon:
          type: number
          format: double
          description: Longitude
          example: 37.6176

    CityResponseDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        countryId:
          type: string
          format: uuid
          description: Country ID
        nameRu:
          type: string
          description: City name in Russian
        nameEn:
          type: string
          description: City name in English
        region:
          type: string
          description: Region/state
        lat:
          type: number
          format: double
          description: Latitude
        lon:
          type: number
          format: double
          description: Longitude

    RestroomCreateDto:
      type: object
      required:
        - address
        - feeType
        - accessibilityType
        - lat
        - lon
        - dataSource
        - amenities
      properties:
        cityId:
          type: string
          format: uuid
          description: City ID (optional)
        name:
          type: string
          description: Restroom name (optional)
          example: Central Park Restroom
        description:
          type: string
          description: Restroom description (optional)
          example: Public restroom
        address:
          type: string
          description: Restroom address
          example: 123 Main Street, New York, NY
        phones:
          type: object
          description: Phone numbers as JSON object (optional)
          example: {"main": "+1-555-123-4567", "emergency": "+1-555-911"}
        workTime:
          type: object
          description: Working hours as JSON object (optional)
          example: {"monday": "06:00-22:00", "tuesday": "06:00-22:00"}
        feeType:
          type: string
          enum: [FREE, PAID]
          description: Fee type
        accessibilityType:
          type: string
          enum: [MEN, WOMEN, UNISEX, FAMILY, DISABLED]
          description: Accessibility type
        lat:
          type: number
          format: double
          description: Latitude
          example: 40.7829
        lon:
          type: number
          format: double
          description: Longitude
          example: -73.9654
        dataSource:
          type: string
          enum: [MANUAL, USER, API, IMPORT]
          description: Data source
        amenities:
          type: object
          description: Amenities as JSON object
          example: {"wifi": "true", "heating": "true"}
        parentPlaceName:
          type: string
          description: Parent place name (e.g., shopping mall, restaurant)
          example: Central Park Mall
        parentPlaceType:
          type: string
          description: Parent place type
          example: SHOPPING_MALL
        inheritParentSchedule:
          type: boolean
          description: Whether to inherit parent place schedule
          example: false

    RestroomResponseDto:
      type: object
      description: Enriched restroom details DTO with building and subway station information
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        cityId:
          type: string
          format: uuid
          description: City ID (optional)
        buildingId:
          type: string
          format: uuid
          description: Building ID (optional)
        subwayStationId:
          type: string
          format: uuid
          description: Subway station ID (optional)
        name:
          type: string
          description: Restroom name (optional)
        address:
          type: string
          description: Restroom address
        phones:
          type: object
          description: Phone numbers as JSON object (optional)
        workTime:
          type: object
          description: Working hours as JSON object (optional). If inheritBuildingSchedule is true, building.workTime should be used.
        feeType:
          type: string
          enum: [FREE, PAID]
          description: Fee type
        accessibilityType:
          type: string
          enum: [MEN, WOMEN, UNISEX, FAMILY, DISABLED, NONE]
          description: Accessibility type
        placeType:
          type: string
          description: Place type
        coordinates:
          type: object
          description: Geographic coordinates
          properties:
            lat:
              type: number
              format: double
            lon:
              type: number
              format: double
        dataSource:
          type: string
          enum: [MANUAL, USER, API, IMPORT]
          description: Data source
        status:
          type: string
          enum: [ACTIVE, INACTIVE, PENDING, TEMP_CLOSED]
          description: Restroom status
        amenities:
          type: object
          description: Amenities as JSON object. May contain payment_methods array.
        externalMaps:
          type: object
          description: External maps references as JSON object
        accessNote:
          type: string
          description: Access note (optional)
        directionGuide:
          type: string
          description: Direction guide (optional)
        inheritBuildingSchedule:
          type: boolean
          description: Whether to inherit building schedule. If true, use building.workTime.
        hasPhotos:
          type: boolean
          description: Whether restroom has photos
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        building:
          $ref: '#/components/schemas/BuildingResponseDto'
          description: Building information (optional, included when buildingId is present)
        subwayStation:
          $ref: '#/components/schemas/SubwayStationResponseDto'
          description: Subway station information (optional, included when subwayStationId is present)

    NearestRestroomSlimDto:
      type: object
      description: Slim DTO for nearest restrooms list. Contains only fields necessary for list UI and caching.
      required:
        - id
        - displayName
        - distanceMeters
        - feeType
        - queryCoordinates
        - restroomCoordinates
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        displayName:
          type: string
          description: Display name for the restroom. Computed as restroom.name ?: building.displayName ?: "Туалет"
        distanceMeters:
          type: number
          format: double
          description: Distance from search point in meters
        feeType:
          type: string
          enum: [FREE, PAID]
          description: Fee type
        queryCoordinates:
          type: object
          description: Search point (query) coordinates
          required:
            - lat
            - lon
          properties:
            lat:
              type: number
              format: double
              description: Latitude
            lon:
              type: number
              format: double
              description: Longitude
        restroomCoordinates:
          type: object
          description: Restroom geographic coordinates
          required:
            - lat
            - lon
          properties:
            lat:
              type: number
              format: double
              description: Latitude
            lon:
              type: number
              format: double
              description: Longitude

    PageResponseCountry:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CountryResponseDto'
          description: Page content
        page:
          type: integer
          description: Current page number
        size:
          type: integer
          description: Page size
        totalElements:
          type: integer
          format: int64
          description: Total number of elements
        totalPages:
          type: integer
          description: Total number of pages
        first:
          type: boolean
          description: Is first page
        last:
          type: boolean
          description: Is last page

    PageResponseCity:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CityResponseDto'
          description: Page content
        page:
          type: integer
          description: Current page number
        size:
          type: integer
          description: Page size
        totalElements:
          type: integer
          format: int64
          description: Total number of elements
        totalPages:
          type: integer
          description: Total number of pages
        first:
          type: boolean
          description: Is first page
        last:
          type: boolean
          description: Is last page

    PageResponseRestroom:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/RestroomResponseDto'
          description: Page content
        page:
          type: integer
          description: Current page number
        size:
          type: integer
          description: Page size
        totalElements:
          type: integer
          format: int64
          description: Total number of elements
        totalPages:
          type: integer
          description: Total number of pages
        first:
          type: boolean
          description: Is first page
        last:
          type: boolean
          description: Is last page

    BuildingResponseDto:
      type: object
      description: Building information DTO
      properties:
        id:
          type: string
          format: uuid
        cityId:
          type: string
          format: uuid
        name:
          type: string
          description: Building name (optional)
        address:
          type: string
        buildingType:
          type: string
          description: Building type
        workTime:
          type: object
          description: Working hours as JSON object (optional)
        coordinates:
          type: object
          properties:
            lat:
              type: number
              format: double
            lon:
              type: number
              format: double
        externalIds:
          type: object
          description: External IDs as JSON object (optional)
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SubwayStationResponseDto:
      type: object
      description: Subway station information DTO
      properties:
        id:
          type: string
          format: uuid
        subwayLineId:
          type: string
          format: uuid
          nullable: true
        nameRu:
          type: string
        nameEn:
          type: string
        isTransfer:
          type: boolean
        coordinates:
          type: object
          properties:
            lat:
              type: number
              format: double
            lon:
              type: number
              format: double
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        line:
          $ref: '#/components/schemas/SubwayLineResponseDto'
          description: Subway line information (optional)

    SubwayLineResponseDto:
      type: object
      description: Subway line information DTO
      properties:
        id:
          type: string
          format: uuid
        cityId:
          type: string
          format: uuid
        nameRu:
          type: string
        nameEn:
          type: string
        hexColor:
          type: string
          description: Line color in hex format
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          description: HTTP status code
          example: 400
        message:
          type: string
          description: Detailed error message
          example: "Invalid UUID format"
        path:
          type: string
          description: Request path where error occurred
          example: "/api/v1/countries/123"
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
          description: Field validation errors (only present for validation errors)

    FieldError:
      type: object
      properties:
        field:
          type: string
          description: Field name
          example: "nameRu"
        message:
          type: string
          description: Error message
          example: "nameRu must not be blank"
