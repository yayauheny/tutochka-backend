openapi: 3.0.3
info:
  title: Tutochka Backend API
  description: REST API for countries, cities, restrooms, imports, and health checks
  version: 0.1.0

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

paths:
  /health:
    get:
      summary: Health check
      description: Return service and database status
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  service:
                    type: string
                    example: TuTochka API
                  database:
                    type: string
                    example: connected

  /health/ready:
    get:
      summary: Readiness check
      description: Return readiness and database status
      responses:
        '200':
          description: Readiness status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  database:
                    type: string
                    example: connected

  /health/live:
    get:
      summary: Liveness check
      description: Return liveness status
      responses:
        '200':
          description: Liveness status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: alive
                  service:
                    type: string
                    example: TuTochka API

  /import:
    post:
      summary: Import one item
      description: Import one provider payload item
      parameters:
        - name: Import-Provider
          in: header
          required: true
          description: Import provider
          schema:
            type: string
            enum: [TWO_GIS, YANDEX_MAPS, GOOGLE_MAPS, OSM, USER, MANUAL]
        - name: Import-Payload-Type
          in: header
          required: true
          description: Import payload type
          schema:
            type: string
            enum: [TWO_GIS_SCRAPED_PLACE_JSON, YANDEX_MAPS_SCRAPED_PLACE_JSON, MANUAL]
        - name: Import-City-Id
          in: header
          required: true
          description: City ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportRequestDto'
      responses:
        '201':
          description: Import completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResponseDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /import/batch:
    post:
      summary: Import a batch
      description: Import multiple provider payload items
      parameters:
        - name: Import-Provider
          in: header
          required: true
          description: Import provider
          schema:
            type: string
            enum: [TWO_GIS, YANDEX_MAPS, GOOGLE_MAPS, OSM, USER, MANUAL]
        - name: Import-Payload-Type
          in: header
          required: true
          description: Import payload type
          schema:
            type: string
            enum: [TWO_GIS_SCRAPED_PLACE_JSON, YANDEX_MAPS_SCRAPED_PLACE_JSON, MANUAL]
        - name: Import-City-Id
          in: header
          required: true
          description: City ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportRequestDto'
      responses:
        '201':
          description: Batch import completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportBatchResponseDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /countries:
    get:
      summary: List countries
      description: Return paginated countries
      parameters:
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          description: Sort field
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseCountry'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create country
      description: Create a country
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CountryCreateDto'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryResponseDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /countries/{id}:
    get:
      summary: Get country
      description: Return one country by ID
      parameters:
        - name: id
          in: path
          required: true
          description: Country ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryResponseDto'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /countries/code/{code}:
    get:
      summary: Get country by code
      description: Return one country by code
      parameters:
        - name: code
          in: path
          required: true
          description: Country code
          schema:
            type: string
            example: US
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryResponseDto'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cities:
    get:
      summary: List cities
      description: Return paginated cities
      parameters:
        - name: page
          in: query
          description: Page number (0-based)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          description: Sort field
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseCity'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create city
      description: Create a city
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CityCreateDto'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityResponseDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cities/{id}:
    get:
      summary: Get city
      description: Return one city by ID
      parameters:
        - name: id
          in: path
          required: true
          description: City ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityResponseDto'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cities/country/{countryId}:
    get:
      summary: List cities by country
      description: Return cities for one country
      parameters:
        - name: countryId
          in: path
          required: true
          description: Country ID
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: Page number (0-based)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseCity'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Country not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cities/search:
    get:
      summary: Search cities
      description: Search cities by name
      parameters:
        - name: name
          in: query
          required: true
          description: City name to search
          schema:
            type: string
            example: Moscow
        - name: page
          in: query
          description: Page number (0-based)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseCity'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restrooms:
    get:
      summary: List restrooms
      description: Return paginated restrooms
      parameters:
        - name: page
          in: query
          description: Page number (0-based)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          description: Sort field
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseRestroom'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create restroom
      description: Create a restroom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestroomCreateDto'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestroomResponseDto'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restrooms/{id}:
    get:
      summary: Get restroom
      description: Return one restroom by ID
      parameters:
        - name: id
          in: path
          required: true
          description: Restroom ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestroomResponseDto'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restrooms/city/{cityId}:
    get:
      summary: List restrooms by city
      description: Return restrooms for one city
      parameters:
        - name: cityId
          in: path
          required: true
          description: City ID
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: Page number (0-based)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseRestroom'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: City not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restrooms/nearest:
    get:
      summary: Nearest restrooms
      description: Return nearest restrooms for a coordinate
      parameters:
        - name: lat
          in: query
          required: true
          description: Latitude
          schema:
            type: number
            format: double
            example: 40.7128
        - name: lon
          in: query
          required: true
          description: Longitude
          schema:
            type: number
            format: double
            example: -74.0060
        - name: limit
          in: query
          description: Max results
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 5
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NearestRestroomSlimDto'
        '400':
          description: Invalid coordinates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ImportRequestDto:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: Raw provider items
          items:
            type: object
            additionalProperties: true

    ImportResponseDto:
      type: object
      properties:
        importId:
          type: string
          format: uuid
          description: Import job ID
        restroomId:
          type: string
          format: uuid
          description: Restroom ID
        buildingId:
          type: string
          format: uuid
          nullable: true
          description: Building ID
        status:
          type: string
          enum: [PENDING, SUCCESS, FAILED]
          description: Import status

    ImportBatchResponseDto:
      type: object
      properties:
        importId:
          type: string
          format: uuid
          description: Import job ID
        totalProcessed:
          type: integer
          description: Total items processed
        successful:
          type: integer
          description: Successful items
        failed:
          type: integer
          description: Failed items

    CountryCreateDto:
      type: object
      required:
        - nameRu
        - nameEn
        - code
      properties:
        nameRu:
          type: string
          description: Country name in Russian
          example: Соединенные Штаты
        nameEn:
          type: string
          description: Country name in English
          example: United States
        code:
          type: string
          description: Country code
          example: US

    CountryResponseDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        nameRu:
          type: string
          description: Country name in Russian
        nameEn:
          type: string
          description: Country name in English
        code:
          type: string
          description: Country code

    CityCreateDto:
      type: object
      required:
        - countryId
        - nameRu
        - nameEn
        - lat
        - lon
      properties:
        countryId:
          type: string
          format: uuid
          description: Country ID
        nameRu:
          type: string
          description: City name in Russian
          example: Москва
        nameEn:
          type: string
          description: City name in English
          example: Moscow
        region:
          type: string
          description: Region/state
          example: Moscow Oblast
        lat:
          type: number
          format: double
          description: Latitude
          example: 55.7558
        lon:
          type: number
          format: double
          description: Longitude
          example: 37.6176

    CityResponseDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        countryId:
          type: string
          format: uuid
          description: Country ID
        nameRu:
          type: string
          description: City name in Russian
        nameEn:
          type: string
          description: City name in English
        region:
          type: string
          description: Region/state
        lat:
          type: number
          format: double
          description: Latitude
        lon:
          type: number
          format: double
          description: Longitude

    RestroomCreateDto:
      type: object
      required:
        - address
        - feeType
        - accessibilityType
        - lat
        - lon
        - dataSource
        - amenities
      properties:
        cityId:
          type: string
          format: uuid
          description: City ID (optional)
        name:
          type: string
          description: Restroom name (optional)
          example: Central Park Restroom
        description:
          type: string
          description: Restroom description (optional)
          example: Public restroom
        address:
          type: string
          description: Restroom address
          example: 123 Main Street, New York, NY
        phones:
          type: object
          description: Phone numbers as JSON object (optional)
          example: {"main": "+1-555-123-4567", "emergency": "+1-555-911"}
        workTime:
          type: object
          description: Working hours as JSON object (optional)
          example: {"monday": "06:00-22:00", "tuesday": "06:00-22:00"}
        feeType:
          type: string
          enum: [FREE, PAID]
          description: Fee type
        accessibilityType:
          type: string
          enum: [MEN, WOMEN, UNISEX, FAMILY, DISABLED]
          description: Accessibility type
        lat:
          type: number
          format: double
          description: Latitude
          example: 40.7829
        lon:
          type: number
          format: double
          description: Longitude
          example: -73.9654
        dataSource:
          type: string
          enum: [MANUAL, USER, API, IMPORT]
          description: Data source
        amenities:
          type: object
          description: Amenities as JSON object
          example: {"wifi": "true", "heating": "true"}
        parentPlaceName:
          type: string
          description: Parent place name (e.g., shopping mall, restaurant)
          example: Central Park Mall
        parentPlaceType:
          type: string
          description: Parent place type
          example: SHOPPING_MALL
        inheritParentSchedule:
          type: boolean
          description: Whether to inherit parent place schedule
          example: false

    RestroomResponseDto:
      type: object
      description: Enriched restroom details DTO with building and subway station information
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        cityId:
          type: string
          format: uuid
          description: City ID (optional)
        buildingId:
          type: string
          format: uuid
          description: Building ID (optional)
        subwayStationId:
          type: string
          format: uuid
          description: Subway station ID (optional)
        name:
          type: string
          description: Restroom name (optional)
        address:
          type: string
          description: Restroom address
        phones:
          type: object
          description: Phone numbers as JSON object (optional)
        workTime:
          type: object
          description: Working hours as JSON object (optional). If inheritBuildingSchedule is true, building.workTime should be used.
        feeType:
          type: string
          enum: [FREE, PAID]
          description: Fee type
        accessibilityType:
          type: string
          enum: [MEN, WOMEN, UNISEX, FAMILY, DISABLED, NONE]
          description: Accessibility type
        placeType:
          type: string
          description: Place type
        coordinates:
          type: object
          description: Geographic coordinates
          properties:
            lat:
              type: number
              format: double
            lon:
              type: number
              format: double
        dataSource:
          type: string
          enum: [MANUAL, USER, API, IMPORT]
          description: Data source
        status:
          type: string
          enum: [ACTIVE, INACTIVE, PENDING, TEMP_CLOSED]
          description: Restroom status
        amenities:
          type: object
          description: Amenities as JSON object. May contain payment_methods array.
        externalMaps:
          type: object
          description: External maps references as JSON object
        accessNote:
          type: string
          description: Access note (optional)
        directionGuide:
          type: string
          description: Direction guide (optional)
        inheritBuildingSchedule:
          type: boolean
          description: Whether to inherit building schedule. If true, use building.workTime.
        hasPhotos:
          type: boolean
          description: Whether restroom has photos
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        building:
          $ref: '#/components/schemas/BuildingResponseDto'
          description: Building information (optional, included when buildingId is present)
        subwayStation:
          $ref: '#/components/schemas/SubwayStationResponseDto'
          description: Subway station information (optional, included when subwayStationId is present)

    NearestRestroomSlimDto:
      type: object
      description: Slim DTO for nearest restrooms list. Contains only fields necessary for list UI and caching.
      required:
        - id
        - displayName
        - distanceMeters
        - feeType
        - queryCoordinates
        - restroomCoordinates
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        displayName:
          type: string
          description: Display name for the restroom. Computed as restroom.name ?: building.displayName ?: "Туалет"
        distanceMeters:
          type: number
          format: double
          description: Distance from search point in meters
        feeType:
          type: string
          enum: [FREE, PAID]
          description: Fee type
        queryCoordinates:
          type: object
          description: Search point (query) coordinates
          required:
            - lat
            - lon
          properties:
            lat:
              type: number
              format: double
              description: Latitude
            lon:
              type: number
              format: double
              description: Longitude
        restroomCoordinates:
          type: object
          description: Restroom geographic coordinates
          required:
            - lat
            - lon
          properties:
            lat:
              type: number
              format: double
              description: Latitude
            lon:
              type: number
              format: double
              description: Longitude

    PageResponseCountry:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CountryResponseDto'
          description: Page content
        page:
          type: integer
          description: Current page number
        size:
          type: integer
          description: Page size
        totalElements:
          type: integer
          format: int64
          description: Total number of elements
        totalPages:
          type: integer
          description: Total number of pages
        first:
          type: boolean
          description: Is first page
        last:
          type: boolean
          description: Is last page

    PageResponseCity:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CityResponseDto'
          description: Page content
        page:
          type: integer
          description: Current page number
        size:
          type: integer
          description: Page size
        totalElements:
          type: integer
          format: int64
          description: Total number of elements
        totalPages:
          type: integer
          description: Total number of pages
        first:
          type: boolean
          description: Is first page
        last:
          type: boolean
          description: Is last page

