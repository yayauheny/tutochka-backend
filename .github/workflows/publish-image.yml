name: Publish Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-backend-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract backend image metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/yayauheny/tutochka-backend
          tags: |
            type=raw,value=prod,enable={{is_default_branch}}
            type=sha
        env:
          DOCKER_METADATA_SHORT_SHA_LENGTH: 12

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          buildkitd-flags: --debug

      - name: Build and push backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}

  build-bot-image:
    runs-on: ubuntu-latest
    needs: build-backend-image
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract bot image metadata
        id: bot-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/yayauheny/tutochka-bot
          tags: |
            type=raw,value=prod,enable={{is_default_branch}}
            type=sha
        env:
          DOCKER_METADATA_SHORT_SHA_LENGTH: 12

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          buildkitd-flags: --debug

      - name: Build and push bot image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: bot/Dockerfile
          push: true
          tags: ${{ steps.bot-meta.outputs.tags }}
          labels: ${{ steps.bot-meta.outputs.labels }}
